name: Pruebas Motor V3

on:
  push:
    paths:
      - "app.py"
      - "motor_v3.py"
      - "lector_global.py"
      - "procesador_v3.py"
      - "reportes_v3.py"
      - "exportador_excel_v3.py"
      - "generar_excel_v3.py"
      - "pruebas_motor_v3.py"
      - "pruebas_lector_global.py"
      - "pruebas_integracion_v3.py"
      - "pruebas_reportes_v3.py"
      - "pruebas_exportador_excel_v3.py"
      - "datos/**"
      - "requirements.txt"
      - ".github/workflows/pruebas.yml"
  workflow_dispatch:

jobs:
  probar_motor:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validar sintaxis de módulos
        run: python -m py_compile app.py motor_v3.py lector_global.py procesador_v3.py reportes_v3.py exportador_excel_v3.py generar_excel_v3.py

      - name: Ejecutar pruebas del motor FIFO
        run: python pruebas_motor_v3.py

      - name: Ejecutar pruebas del lector GLOBAL
        run: python pruebas_lector_global.py

      - name: Ejecutar prueba de integración
        run: python pruebas_integracion_v3.py

      - name: Ejecutar pruebas de reportes
        run: python pruebas_reportes_v3.py

      - name: Ejecutar pruebas de exportación Excel
        run: python pruebas_exportador_excel_v3.py
